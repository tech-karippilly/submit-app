<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Favicon -->
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="apple-touch-icon" href="/favicon.png" />
    <title>The Summit LLP - Healthcare Quality & Sustainability Conference</title>
    <meta name="description" content="A premier healthcare quality and sustainability conference in Kerala, India. Join global healthcare leaders, quality experts, and innovators." />
    <meta name="author" content="The Summit LLP" />

    <!-- Open Graph Metadata -->
    <meta property="og:title" content="The Summit LLP - Healthcare Quality Conference" />
    <meta property="og:description" content="A premier healthcare quality and sustainability conference in Kerala, India." />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="/og-image.png" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="The Summit LLP - Healthcare Quality Conference" />
    <meta name="twitter:description" content="A premier healthcare quality and sustainability conference in Kerala, India." />
    <meta name="twitter:image" content="/og-image.png" />

    <!-- Theme initialization script - runs before React loads to prevent flash -->
    <script>
      (function() {
        const savedTheme = localStorage.getItem('summit-theme');
        // Apply theme if it's not the default (handles both 'default' and 'ocean' as default)
        if (savedTheme && savedTheme !== 'default' && savedTheme !== 'ocean') {
          document.documentElement.setAttribute('data-theme', savedTheme);
        }
      })();
    </script>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
